AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Wedding RSVP - Serverless Stack

Globals:
  Function:
    Runtime: nodejs18.x
    MemorySize: 128
    Timeout: 10
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref RsvpTable

Parameters:
  AdminPassword:
    Type: String
    NoEcho: true
    Description: 管理画面パスワード（デプロイ時に指定）

Resources:

  # ---- DynamoDB ----
  RsvpTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: wedding-rsvp
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # ---- Lambda ----
  RsvpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: wedding-rsvp
      CodeUri: src/backend/
      Handler: handler.handler
      Environment:
        Variables:
          ADMIN_PASSWORD: !Ref AdminPassword
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RsvpTable
      Events:
        PostRsvp:
          Type: HttpApi
          Properties:
            Path: /api/rsvp
            Method: POST
            ApiId: !Ref HttpApi
        GetAdminRsvp:
          Type: HttpApi
          Properties:
            Path: /api/admin/rsvp
            Method: GET
            ApiId: !Ref HttpApi
        DeleteAdminRsvp:
          Type: HttpApi
          Properties:
            Path: /api/admin/rsvp/{id}
            Method: DELETE
            ApiId: !Ref HttpApi
        Options:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: OPTIONS
            ApiId: !Ref HttpApi

  # ---- API Gateway (HTTP API) ----
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS

  # ---- S3（フロント配信）----
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub wedding-frontend-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ---- CloudFront ----
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: wedding-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_200  # 日本（アジア）エッジを含む
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig: {}
          - Id: ApiOrigin
            DomainName: !Sub ${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods: [GET, HEAD]
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  CloudFrontDomain:
    Description: CloudFront ドメイン（config.js の API_BASE に設定する）
    Value: !GetAtt CloudFrontDistribution.DomainName
  ApiEndpoint:
    Description: API Gateway エンドポイント
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
  FrontendBucketName:
    Description: フロントのS3バケット名
    Value: !Ref FrontendBucket
