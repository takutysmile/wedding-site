name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: AWS認証
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: S3にフロントエンドをアップロード
        run: |
          aws s3 sync src/frontend/ s3://wedding-site-frontend-2026 --delete

      - name: CloudFrontのキャッシュを削除
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ECF79T02L8SRG \
            --paths "/*"

      - name: Lambdaをデプロイ
        run: |
          cd src/backend
          zip -r ../../function.zip . --exclude "node_modules/*"
          cd ../..
          aws lambda update-function-code \
            --function-name wedding-rsvp-handler \
            --zip-file fileb://function.zip
